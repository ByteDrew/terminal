<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="../images/aperture-terminal-icon.png" type="image/png">
  <title>Aperture Science Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/terminal.css">

</head>
<body>
  <div class="main-container">
    <div class="header-container">
      <div class="top-right-widgets">
        <div class="widget widget-data-scroller">
          <div class="data-container">
            <div class="data-column"><div class="scroll-up" id="dataCol1"></div></div>
            <div class="data-column"><div class="scroll-down" id="dataCol2"></div></div>
          </div>
        </div>

        <div class="widget widget-stats">
          <span>2.67</span><span>1002</span><span>45.6</span>
        </div>

<div class="widget widget-logo">
  <img src="../images/aperture-terminal-icon.png" alt="Aperture Logo" style="width:100%; height:100%; object-fit:contain;">
</div>
      </div>
    </div>

    <div class="main-content">
      <div class="dialogue-area">
        <div class="history-scroll" id="terminal"></div>
      </div>
      <div class="credits-area" id="credits"></div>
    </div>
  </div>
  <div class="crt-scanlines"></div>

  <script src="../js/terminal.js"></script>
</body>
</html>
